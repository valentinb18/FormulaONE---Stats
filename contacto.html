    <link rel="stylesheet" href="css/styles.css">
</head>

                    </li>
                </ul>

        </div>

    <section id="inicio-contactos">
        <div class="container text-center py-5">
            <h1 class="fw-bold display-3">CONTACTO</h1>
            <p class="fs-5">¿TENES ALGUNA CONSULTA O SUGERENCIA? ESCRIBINOS.</p>
        </div>
    </section>

    <section id="seccion-contacto">
        <div class="container py-5">
            <div class="formulario-contacto mx-auto">

                <div class="mb-3">
                    <label for="nombre" class="form-label fw-bold">NOMBRE</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Tu nombre">
                    <span class="error" id="error-nombre"></span>
                </div>

                <div class="mb-3">
                    <label for="apellido" class="form-label fw-bold">APELLIDO</label>
                    <input type="text" id="apellido" class="form-control" placeholder="Tu apellido">
                    <span class="error" id="error-apellido"></span>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">EMAIL</label>
                    <input type="text" id="email" class="form-control" placeholder="Tu email">
                    <span class="error" id="error-email"></span>
                </div>

                <div class="mb-3">
                    <label for="telefono" class="form-label fw-bold">TELEFONO</label>
                    <input type="text" id="telefono" class="form-control" placeholder="Tu telefono">
                    <span class="error" id="error-telefono"></span>
                </div>

                <div class="mb-3">
                    <label for="motivo" class="form-label fw-bold">CONSULTA</label>
                    <select id="motivo" class="form-select">
                        <option value="">Selecciona una opcion</option>
                        <option value="consulta">Consulta general</option>
                        <option value="sugerencia">Sugerencia</option>
                        <option value="error">Reportar error</option>
                        <option value="otro">Otro</option>
                    </select>
                    <span class="error" id="error-motivo"></span>
                </div>

                <div class="mb-3">
                    <label for="mensaje" class="form-label fw-bold">MENSAJE</label>
                    <textarea id="mensaje" class="form-control" placeholder="Escribi un mensaje..." rows="4"></textarea>
                    <span class="error" id="error-mensaje"></span>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" id="terminos" class="form-check-input">
                        <label class="form-check-label" for="terminos">Acepto los terminos y condiciones.</label>
                    </div>
                    <span class="error" id="error-terminos"></span>
                </div>

                <button id="btnEnviar" class="btn w-100">ENVIAR MENSAJE</button>
                <div id="mensaje-exito" class="text-center mt-3"></div>

            </div>
        </div>
    </section>

    <footer id="footer">
        <div class="container text-center py-4">
            <p class="mb-2">FormulaONE Stats - Todo sobre la Formula 1.</p>
            <div id="redes" class="mb-2">
                <a href="https://twitter.com" target="_blank" class="text-white text-decoration-none mx-2">
                    <i class="fa-brands fa-x-twitter"></i>Twitter
                </a>
                <a href="https://instagram.com" target="_blank" class="text-white text-decoration-none mx-2">
                    <i class="fa-brands fa-instagram"></i>Instagram
                </a>
                <a href="https://twitch.com" target="_blank" class="text-white text-decoration-none mx-2">
                    <i class="fa-brands fa-twitch"></i>Twitch
                </a>
            </div>
            <p class="mb-0">2026 FormulaONE Stats. Todos los derechos reservados.</p>
        </div>
    </footer>

        AOS.init();
